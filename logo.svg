<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0c0c20"/>
      <stop offset="100%" stop-color="#060610"/>
    </radialGradient>

    <!-- Cyan glow for hider -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#55bbff" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Red glow for seeker -->
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ee4848" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Crosshair glow -->
    <filter id="crosshairGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ee4848" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ee4848" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Red text glow for HUNT -->
    <filter id="redTextGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ee4848" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#55bbff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#3388ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ee4848" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Scan line pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="2" fill="rgba(255,255,255,0.015)"/>
    </pattern>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Icon rounded rect clip -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180"/>
    </clipPath>
  </defs>

  <!-- Clipped to rounded square for app icon -->
  <g clip-path="url(#iconClip)">

    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle grid -->
    <g opacity="0.06">
      <line x1="0" y1="256" x2="1024" y2="256" stroke="#5bf" stroke-width="0.5"/>
      <line x1="0" y1="512" x2="1024" y2="512" stroke="#5bf" stroke-width="0.5"/>
      <line x1="0" y1="768" x2="1024" y2="768" stroke="#5bf" stroke-width="0.5"/>
      <line x1="256" y1="0" x2="256" y2="1024" stroke="#5bf" stroke-width="0.5"/>
      <line x1="512" y1="0" x2="512" y2="1024" stroke="#5bf" stroke-width="0.5"/>
      <line x1="768" y1="0" x2="768" y2="1024" stroke="#5bf" stroke-width="0.5"/>
    </g>

    <!-- Scanlines overlay -->
    <rect width="1024" height="1024" fill="url(#scanlines)"/>

    <!-- Outer ring -->
    <circle cx="512" cy="440" r="260" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.6"/>
    <circle cx="512" cy="440" r="280" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.2" stroke-dasharray="8 12"/>

    <!-- Crosshair centered on the scene -->
    <g filter="url(#crosshairGlow)" opacity="0.7">
      <!-- Horizontal lines -->
      <line x1="330" y1="440" x2="470" y2="440" stroke="#ee4848" stroke-width="2"/>
      <line x1="554" y1="440" x2="694" y2="440" stroke="#ee4848" stroke-width="2"/>
      <!-- Vertical lines -->
      <line x1="512" y1="258" x2="512" y2="398" stroke="#ee4848" stroke-width="2"/>
      <line x1="512" y1="482" x2="512" y2="622" stroke="#ee4848" stroke-width="2"/>
      <!-- Center dot -->
      <circle cx="512" cy="440" r="4" fill="#ee4848"/>
      <!-- Corner brackets -->
      <path d="M 462 390 L 462 380 L 472 380" fill="none" stroke="#ee4848" stroke-width="2"/>
      <path d="M 562 390 L 562 380 L 552 380" fill="none" stroke="#ee4848" stroke-width="2"/>
      <path d="M 462 490 L 462 500 L 472 500" fill="none" stroke="#ee4848" stroke-width="2"/>
      <path d="M 562 490 L 562 500 L 552 500" fill="none" stroke="#ee4848" stroke-width="2"/>
    </g>

    <!-- Hider blob (matches in-game drawAgent: body r=9, head r=6.5, scaled 5x) -->
    <g filter="url(#cyanGlow)" transform="translate(380, 430)">
      <!-- Shadow -->
      <ellipse cx="0" cy="35" rx="50" ry="20" fill="rgba(0,0,0,0.25)"/>
      <!-- Body circle -->
      <circle cx="0" cy="0" r="45" fill="#3388ff"/>
      <!-- Body highlight -->
      <circle cx="-10" cy="-15" r="25" fill="rgba(255,255,255,0.07)"/>
      <!-- Left arm -->
      <line x1="-28" y1="-8" x2="-58" y2="-30" stroke="#3388ff" stroke-width="13" stroke-linecap="round"/>
      <!-- Right arm -->
      <line x1="28" y1="-8" x2="50" y2="12" stroke="#3388ff" stroke-width="13" stroke-linecap="round"/>
      <!-- Head circle -->
      <circle cx="0" cy="-50" r="33" fill="#55bbff"/>
      <!-- Head highlight -->
      <circle cx="-8" cy="-60" r="15" fill="rgba(255,255,255,0.1)"/>
      <!-- Eyes (looking left = fleeing) -->
      <circle cx="-12" cy="-55" r="5" fill="rgba(255,255,255,0.9)"/>
      <circle cx="6" cy="-55" r="5" fill="rgba(255,255,255,0.9)"/>
      <!-- Pupils -->
      <circle cx="-14" cy="-55" r="2.5" fill="#111"/>
      <circle cx="4" cy="-55" r="2.5" fill="#111"/>
      <!-- Direction arrow (fleeing left) -->
      <polygon points="-80,0 -56,18 -56,-18" fill="#55bbff" opacity="0.5"/>
    </g>

    <!-- Seeker blob (same structure, red, facing right = chasing) -->
    <g filter="url(#redGlow)" transform="translate(644, 430)">
      <!-- Shadow -->
      <ellipse cx="0" cy="35" rx="50" ry="20" fill="rgba(0,0,0,0.25)"/>
      <!-- Body circle -->
      <circle cx="0" cy="0" r="45" fill="#cc2828"/>
      <!-- Body highlight -->
      <circle cx="-10" cy="-15" r="25" fill="rgba(255,255,255,0.07)"/>
      <!-- Left arm (reaching forward) -->
      <line x1="-28" y1="-8" x2="-50" y2="12" stroke="#cc2828" stroke-width="13" stroke-linecap="round"/>
      <!-- Right arm (reaching forward) -->
      <line x1="28" y1="-8" x2="58" y2="-30" stroke="#cc2828" stroke-width="13" stroke-linecap="round"/>
      <!-- Head circle -->
      <circle cx="0" cy="-50" r="33" fill="#ee4848"/>
      <!-- Head highlight -->
      <circle cx="-8" cy="-60" r="15" fill="rgba(255,255,255,0.1)"/>
      <!-- Eyes (looking right = chasing) -->
      <circle cx="-6" cy="-55" r="5" fill="rgba(255,255,255,0.9)"/>
      <circle cx="12" cy="-55" r="5" fill="rgba(255,255,255,0.9)"/>
      <!-- Pupils -->
      <circle cx="-4" cy="-55" r="2.5" fill="#111"/>
      <circle cx="14" cy="-55" r="2.5" fill="#111"/>
      <!-- Direction arrow (chasing right) -->
      <polygon points="80,0 56,18 56,-18" fill="#ee4848" opacity="0.5"/>
    </g>

    <!-- Footprint trail from hider (fading, tracker ability) -->
    <g opacity="0.3" fill="#f84">
      <circle cx="310" cy="490" r="6"/>
      <circle cx="285" cy="505" r="5" opacity="0.6"/>
      <circle cx="258" cy="515" r="4" opacity="0.3"/>
    </g>

    <!-- "MANHUNT" title — MAN in white, HUNT in red (matches in-game h1 span styling) -->
    <g>
      <text x="512" y="740" text-anchor="middle" font-family="'Impact', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="120" font-weight="900" letter-spacing="14" fill="#e8e8f0">MAN<tspan fill="#f55">HUNT</tspan></text>
    </g>

    <!-- Underline accent -->
    <line x1="220" y1="762" x2="804" y2="762" stroke="url(#ringGrad)" stroke-width="3" opacity="0.7"/>

    <!-- Tagline -->
    <text x="512" y="800" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" letter-spacing="10" fill="#5bf" opacity="0.7">
      HIDE . SEEK . SURVIVE
    </text>

    <!-- Vignette overlay -->
    <rect width="1024" height="1024" fill="url(#vignette)"/>

    <!-- Subtle border -->
    <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="none" stroke="rgba(85,187,255,0.15)" stroke-width="2"/>

  </g>
</svg>